---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: aws-self-managed-nvidia-gpu
  #namespace: open-cluster-management-policies
placementRef:
  name: aws-self-managed-nvidia-gpu
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: gpu-mcp
    apiGroup: policy.open-cluster-management.io
    kind: Policy

  - name: aws-nvidia-machinesets
    apiGroup: policy.open-cluster-management.io
    kind: Policy

  - name: operator-bundle-nvidia-gpu
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet
  - name: instance-bundle-nvidia-gpu
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet
  - name: openshift-ai-aws
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet