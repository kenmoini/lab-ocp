---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kube-system/
  - netobserv/
  - open-cluster-management-observability/
  - openshift-gitops/
  - openshift-logging/
  - redhat-ods-applications/
  - redhat-ods-monitoring/
  - rhbk/
  - rhdh/
  - stackrox/

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true