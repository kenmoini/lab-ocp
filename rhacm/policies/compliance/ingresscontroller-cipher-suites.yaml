apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: ingress-cipher
  annotations:
    policy.open-cluster-management.io/categories: OCPC - OpenShift Compliance
    policy.open-cluster-management.io/standards: Kemo Labs 2026
    policy.open-cluster-management.io/controls: CR - Compliance Remediation
    compliance.openshift.io/rule: ingress-cipher
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ingress-cipher
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1
                kind: IngressController
                metadata:
                  name: default
                  namespace: openshift-ingress-operator
                spec:
                  tlsSecurityProfile:
                    type: Custom
                    custom:
                      ciphers:
                        - ECDHE-ECDSA-AES128-GCM-SHA256
                        - ECDHE-RSA-AES128-GCM-SHA256
                        - ECDHE-ECDSA-CHACHA20-POLY1305
                        - ECDHE-RSA-AES256-GCM-SHA384
                        - ECDHE-RSA-CHACHA20-POLY1305
                        - ECDHE-ECDSA-AES256-GCM-SHA384
                        - TLS_AES_128_GCM_SHA256
                        - TLS_AES_256_GCM_SHA384
                        - TLS_CHACHA20_POLY1305_SHA256
                      minTLSVersion: VersionTLS12