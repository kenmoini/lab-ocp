apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: disa-stig-sysctls
  annotations:
    policy.open-cluster-management.io/categories: OCPC - OpenShift Compliance
    policy.open-cluster-management.io/standards: Kemo Labs 2026
    policy.open-cluster-management.io/controls: CR - Compliance Remediation
    compliance.openshift.io/rule: disa-stig-sysctls
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: disa-stig-sysctls
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  labels:
                    machineconfiguration.openshift.io/role: master
                  name: 75-master-disa-stig-sysctls
                spec:
                  config:
                    ignition:
                      version: 3.1.0
                    storage:
                      files:
                        - contents:
                            source: 'data:,kernel.perf_event_paranoid%3D2%0A'
                          mode: 420
                          overwrite: true
                          path: /etc/sysctl.d/75-sysctl_kernel_perf_event_paranoid.conf
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  labels:
                    machineconfiguration.openshift.io/role: worker
                  name: 75-worker-disa-stig-sysctls
                spec:
                  config:
                    ignition:
                      version: 3.1.0
                    storage:
                      files:
                        - contents:
                            source: 'data:,kernel.perf_event_paranoid%3D2%0A'
                          mode: 420
                          overwrite: true
                          path: /etc/sysctl.d/75-sysctl_kernel_perf_event_paranoid.conf