apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: kernelarg-slub-debug
  annotations:
    policy.open-cluster-management.io/categories: OCPC - OpenShift Compliance
    policy.open-cluster-management.io/standards: Kemo Labs 2026
    policy.open-cluster-management.io/controls: CR - Compliance Remediation
    compliance.openshift.io/rule: kernelarg-slub-debug
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: kernelarg-slub-debug
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
          # rhcos4-stig-master-coreos-slub-debug-kernel-argument
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  labels:
                    machineconfiguration.openshift.io/role: master
                  name: 75-master-karg-slub-debug
                spec:
                  config:
                    ignition:
                      version: 3.1.0
                  kernelArguments:
                    - slub_debug=P
          # rhcos4-stig-worker-coreos-slub-debug-kernel-argument
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: MachineConfig
                metadata:
                  labels:
                    machineconfiguration.openshift.io/role: worker
                  name: 75-worker-karg-slub-debug
                spec:
                  config:
                    ignition:
                      version: 3.1.0
                  kernelArguments:
                    - slub_debug=P