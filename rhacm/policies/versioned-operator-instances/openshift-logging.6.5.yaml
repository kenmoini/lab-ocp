---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: ocp-logging-6.5
  #namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/description: Installs the Red Hat OpenShift Logging Operator 6.5 with the Loki Stack
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-SUB - Operator Installation
spec:
  disabled: false
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      name: health-check-odf
      namespace: ""
      compliance: Compliant
  policy-templates:

    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rh-loki-6.5-lokistack
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: loki.grafana.com/v1
                kind: LokiStack
                metadata:
                  name: logging-loki 
                  namespace: openshift-logging 
                spec:
                  size: 1x.extra-small
                  template:
                    ingester:
                      replicas: 3
                  limits:
                    global:
                      retention:
                        days: 1
                      # Needed when doing audit/infra logging
                      ingestion:
                        ingestionBurstSize: 50
                        ingestionRate: 64
                        maxLineSize: 2560000
                        perStreamRateLimit: 10
                        perStreamRateLimitBurst: 30
                  storage:
                    schemas:
                    - version: v13
                      effectiveDate: "2025-10-01" 
                    secret:
                      name: logging-loki-s3
                      type: s3
                    tls:
                      caName: openshift-service-ca.crt
                      caKey: service-ca.crt
                  storageClassName: ocs-storagecluster-cephfs
                  tenants:
                    mode: openshift-logging

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rh-loki-6.5-lokistack
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rh-loki-6.5-stk-stat
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: loki.grafana.com/v1
                kind: LokiStack
                metadata:
                  name: logging-loki
                  namespace: openshift-logging
                status:
                  conditions:
                    - status: 'True'
                      type: Ready

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rh-loki-6.5-stk-stat
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: logging-clf-6.5
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: observability.openshift.io/v1
                kind: ClusterLogForwarder
                metadata:
                  name: local-lokistack
                  namespace: openshift-logging
                spec:
                  collector:
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: 6
                      requests:
                        memory: 2Gi
                        cpu: 2
                  serviceAccount:
                    name: logging-collector
                  filters:
                    - name: only-important
                      type: drop
                      drop:
                        - test:
                            - field: .message
                              notMatches: "(?i)critical|error"
                            - field: .level
                              matches: "debug|info|trace"
                    - name: multiline-detect
                      type: detectMultilineException
                    - name: parse-json
                      type: parse
                  outputs:
                    - name: local-lokistack
                      type: lokiStack
                      lokiStack:
                        target:
                          name: logging-loki
                          namespace: openshift-logging
                        authentication:
                          token:
                            from: serviceAccount
                      tls:
                        ca:
                          key: service-ca.crt
                          configMapName: openshift-service-ca.crt
                  pipelines:
                    - name: infra-app-logs
                      inputRefs:
                        - application
                        - infrastructure
                      outputRefs:
                        - local-lokistack
                      filterRefs:
                        - only-important
                        - multiline-detect
                    # - name: audit-logs
                    #   inputRefs:
                    #   - audit
                    #   outputRefs:
                    #   - local-lokistack