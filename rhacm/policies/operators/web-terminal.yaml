---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: operators-web-terminal
  annotations:
    policy.open-cluster-management.io/description: Installs the Web Terminal Operator
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-SUB - Operator Installation
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-subscription
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: web-terminal
                  namespace: openshift-operators
                spec:
                  channel: fast
                  installPlanApproval: Automatic
                  name: web-terminal
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace

    # Check for the Operator Installation via CSV
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: wto-subscription
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-csv-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: ClusterServiceVersion
                metadata:
                  namespace: openshift-operators
                spec:
                  displayName: Web Terminal
                status:
                  phase: Succeeded
                  reason: InstallSucceeded

    # Check for the readiness of the controller
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: wto-csv-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-controller-status
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: web-terminal-controller
                  namespace: openshift-operators
                status:
                  conditions:
                    - status: 'True'
                      type: Available

    # Check for the existence of the default DevWorkspaceTemplates
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: wto-controller-status
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-template-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: workspace.devfile.io/v1alpha2
                kind: DevWorkspaceTemplate
                metadata:
                  name: web-terminal-tooling
                  namespace: openshift-operators

    # Modify the template to override the tooling container
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: wto-template-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-tools-overrides
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: workspace.devfile.io/v1alpha2
                kind: DevWorkspaceTemplate
                metadata:
                  name: web-terminal-tooling
                  namespace: openshift-operators
                  annotations:
                    web-terminal.redhat.com/unmanaged-state: 'true'
                spec:
                  components:
                    - name: web-terminal-tooling
                      container:
                        image: 'quay.io/kenmoini/wto-tools:latest'
                        memoryLimit: 1024Mi

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: wto-tools-overrides
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: wto-per-user
        spec:
          remediationAction: inform
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates-raw: |
            {{/* ##  Loop through all the Users ## */}}
            {{- $usrList := (lookup "user.openshift.io/v1" "User" "" "").items }}
            {{- range $usr := $usrList }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: workspace.devfile.io/v1alpha2
                kind: DevWorkspace
                metadata:
                  annotations:
                    controller.devfile.io/devworkspace-source: web-terminal
                    controller.devfile.io/restricted-access: 'true'
                    controller.devfile.io/user-name: {{ $usr.metadata.name }}
                  name: terminal-{{ regexReplaceAll "[^a-zA-Z0-9]" $usr.metadata.name "" }}
                  namespace: openshift-terminal
                  finalizers:
                    - rbac.controller.devfile.io
                  labels:
                    console.openshift.io/terminal: 'true'
                    controller.devfile.io/creator: {{ $usr.metadata.uid | quote }}
                spec:
                  routingClass: web-terminal
                  template:
                    attributes:
                      controller.devfile.io/storage-type: per-workspace
                    components:
                      - name: web-terminal-tooling
                        plugin:
                          components:
                            - container:
                                volumeMounts:
                                  - name: web-terminal-storage
                                    path: /home/user/storage
                              name: web-terminal-tooling
                          kubernetes:
                            name: web-terminal-tooling
                            namespace: openshift-operators
                      - name: web-terminal-exec
                        plugin:
                          kubernetes:
                            name: web-terminal-exec
                            namespace: openshift-operators
                      - name: web-terminal-storage
                        volume:
                          size: 1000Mi
            {{- end }}
