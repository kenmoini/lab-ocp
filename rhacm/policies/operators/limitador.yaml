---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: operators-limitador
  annotations:
    policy.open-cluster-management.io/description: Installs the Limitador Operator
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-SUB - Operator Installation
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: limitador-subscription
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: limitador-operator
                  namespace: openshift-operators
                spec:
                  channel: stable
                  installPlanApproval: Manual
                  name: limitador-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
                  startingCSV: limitador-operator.v1.3.1

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: limitador-subscription
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: limitador-status
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: limitador-operator-controller-manager
                  namespace: openshift-operators
                status:
                  conditions:
                    - status: 'True'
                      type: Available