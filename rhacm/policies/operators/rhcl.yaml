---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: operators-rhcl
  annotations:
    policy.open-cluster-management.io/description: Installs the Red Hat Connectivity Link Operator
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-SUB - Operator Installation
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhcl-subscription
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: rhcl-operator
                  namespace: openshift-operators
                spec:
                  channel: stable
                  installPlanApproval: Manual
                  name: rhcl-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
                  startingCSV: rhcl-operator.v1.3.4

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhcl-subscription
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhcl-status
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: kuadrant-operator-controller-manager
                  namespace: openshift-operators
                status:
                  conditions:
                    - status: 'True'
                      type: Available
