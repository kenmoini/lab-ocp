---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: hub-infra-selector-mca
  annotations:
    policy.open-cluster-management.io/description: Moves the Advanced Cluster Management ManagedClusterAddOn objects to infrastructure nodes
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: hub-infra-selector-mca
        spec:
          remediationAction: enforce
          severity: low
          object-templates-raw: |
            {{/* ## Loop through the ManagedClusters - check for the infra label, then apply the modification for infra nodes ## */}}
            {{- $managedClusterList := (lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items }}
            {{- range $managedCluster := $managedClusterList }}
              {{- $infraEnabledCluster := "false" }}
              {{- range $key, $value := $managedCluster.metadata.labels }}
                {{- if and (eq $key "policy.kemo.dev/infra-nodes") (or (eq $value "true") (eq $value "enabled")) }}
                  {{- $infraEnabledCluster = "true" }}
                {{- end }}
              {{- end }}
              {{- if eq $infraEnabledCluster "true" }}
                {{- $addonList := (lookup "addon.open-cluster-management.io/v1beta1" "ManagedClusterAddOn" $managedCluster.metadata.name "").items }}
                {{- range $addon := $addonList }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: addon.open-cluster-management.io/v1beta1
                kind: ManagedClusterAddOn
                metadata:
                  name: {{ $addon.metadata.name }}
                  namespace: {{ $managedCluster.metadata.name }}
                spec:
                  configs:
                    - group: addon.open-cluster-management.io
                      name: infra-nodes
                      namespace: open-cluster-management
                      resource: addondeploymentconfigs
                {{- end }}
              {{- end }}
            {{- end }}