---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: infra-selector-imgreg
  annotations:
    policy.open-cluster-management.io/description: Moves the OpenShift Image Registry to infrastructure nodes
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: infra-selector-imgreg
        spec:
          remediationAction: enforce
          severity: low
          object-templates-raw: |
            {{/* ## Patch the ImageRegistry Config ## */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: imageregistry.operator.openshift.io/v1
                kind: Config
                metadata:
                  name: cluster
                spec:
                  nodeSelector:
                    node-role.kubernetes.io/{{ hasNodesWithExactRoles "infra" | ternary "infra" "worker" }}: ""
                  tolerations:
                    - key: node-role.kubernetes.io/infra
                      operator: Exists
                      effect: NoSchedule
                    - key: node-role.kubernetes.io/infra
                      operator: Exists
                      effect: NoExecute