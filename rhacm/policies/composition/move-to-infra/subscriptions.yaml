---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: infra-selector-subs
  annotations:
    policy.open-cluster-management.io/description: Moves subscriptions to infrastructure nodes
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: infra-selector-subs
        spec:
          remediationAction: enforce
          severity: low
          object-templates-raw: |
            {{/* ##  Loop through all the Subscriptions ## */}}
            {{- $subscriptionList := (lookup "operators.coreos.com/v1alpha1" "Subscription" "" "").items }}
            {{- range $subscription := $subscriptionList }}
            {{/* ## Bug Workaround: The Cluster Ingress Operator currently manages the SMesh3 Sub ## */}}
            {{- if ne $subscription.metadata.name "servicemeshoperator3" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: {{ $subscription.metadata.name }}
                  namespace: {{ $subscription.metadata.namespace }}
                spec:
                  config:
                    nodeSelector:
                      node-role.kubernetes.io/{{ hasNodesWithExactRoles "infra" | ternary "infra" "worker" }}: ""
                    tolerations:
                      - key: node-role.kubernetes.io/infra
                        operator: Exists
                        effect: NoSchedule
                      - key: node-role.kubernetes.io/infra
                        operator: Exists
                        effect: NoExecute
            {{- end }}
            {{- end }}