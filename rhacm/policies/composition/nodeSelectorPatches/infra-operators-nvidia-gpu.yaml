apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: nsp-nvidia-gpu
  annotations:
    policy.open-cluster-management.io/description: Installs the NVIDIA GPU Operator on Infrastructure nodes
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-NSP - Operator Node Selector Patches
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nsp-gpu-operator-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: gpu-operator-certified
                  namespace: nvidia-gpu-operator
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nsp-gpu-operator
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: gpu-operator-certified
                  namespace: nvidia-gpu-operator
                spec:
                  config:
                    nodeSelector:
                      node-role.kubernetes.io/infra: ""
                    tolerations:
                      - key: node-role.kubernetes.io/infra
                        operator: Exists
                        effect: NoSchedule
      extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: nsp-gpu-operator-check
          namespace: ""
          compliance: Compliant
