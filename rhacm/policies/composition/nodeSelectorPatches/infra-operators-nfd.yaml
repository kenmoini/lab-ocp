apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: nsp-nfd
  annotations:
    policy.open-cluster-management.io/description: Installs the Node Feature Discovery (NFD) Operator on Infrastructure nodes
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-NSP - Operator Node Selector Patches
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nsp-nfd-operator-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: nfd
                  namespace: openshift-nfd
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nsp-nfd-operator
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: nfd
                  namespace: openshift-nfd
                spec:
                  config:
                    nodeSelector:
                      node-role.kubernetes.io/infra: ""
                    tolerations:
                      - key: node-role.kubernetes.io/infra
                        operator: Exists
                        effect: NoSchedule
      extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: nsp-nfd-operator-check
          namespace: ""
          compliance: Compliant
