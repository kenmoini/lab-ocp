                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-h100-{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}3'
                  namespace: openshift-machine-api
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                      machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-h100-{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}3'
                  template:
                    metadata:
                      labels:
