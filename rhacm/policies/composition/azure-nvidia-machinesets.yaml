# This policy creates 3 OpenShift MachineSets that are intended for Infrastructure Nodes on Azure.
# This policy assumes the Control Plane is located in the same region and 3 zones as the intended Infrastructure Nodes.  Data from the ControlPlaneMachineSet is used to create the 3 Infra MachineSets.
#
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: azure-machineset-gpu-h100
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: azure-machineset-gpu-h100
        spec:
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: machine.openshift.io/v1beta1
                kind: MachineSet
                metadata:
                  labels:
                    machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "openshift-machine-api" "cluster").status.infrastructureName }}'
                    machine.openshift.io/cluster-api-machine-role: gpu
                    machine.openshift.io/cluster-api-machine-type: gpu
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-h100-{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}1'
                  namespace: openshift-machine-api
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                      machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-h100-{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}1'
                  template:
                    metadata:
                      labels:
                        machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                        machine.openshift.io/cluster-api-machine-role: gpu
                        machine.openshift.io/cluster-api-machine-type: gpu
                        machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-h100-{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}1'
                    spec:
                      metadata:
                        labels:
                          node-role.kubernetes.io/gpu: ""
                      taints:
                        - key: nvidia.com/gpu
                          effect: NoSchedule
                          value: "true"
                      providerSpec:
                        value:
                          apiVersion: machine.openshift.io/v1beta1
                          kind: AzureMachineProviderSpec
                          location: '{{ (lookup "machine.openshift.io/v1" "ControlPlaneMachineSet" "" "cluster").spec.template.machines_v1beta1_machine_openshift_io.spec.providerSpec.value.location }}'
                          zone: '1'
                          vmSize: Standard_D16s_v6
                          osDisk:
                            diskSettings: {}
                            diskSizeGB: 2048
                            managedDisk:
                              securityProfile:
                                diskEncryptionSet: {}
                              storageAccountType: Premium_LRS
                            osType: Linux
                          publicLoadBalancer: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                          vnet: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-vnet'
                          subnet: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-worker-subnet'
                          resourceGroup: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-rg'
                          networkResourceGroup: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-rg'
                          managedIdentity: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-identity'
                          userDataSecret:
                            name: worker-user-data
                          credentialsSecret:
                            name: azure-cloud-credentials
                            namespace: openshift-machine-api
                          securityProfile:
                            settings:
                              securityType: ''
                          publicIP: false
                          acceleratedNetworking: true
                          image:
                            offer: aro4
                            publisher: azureopenshift
                            resourceID: ''
                            sku: 420-v2
                            type: MarketplaceNoPlan
                            version: 9.6.20251015

            - complianceType: musthave
              recreateOption: IfRequired
