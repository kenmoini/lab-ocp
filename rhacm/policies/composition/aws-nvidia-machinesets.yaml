# This policy creates 3 OpenShift MachineSets that are intended for installing OpenShift Cluster Storage on AWS.
#
# More details on installing OCS including the creation of the MachineSets is located here:
# https://red-hat-storage.github.io/ocs-training/training/ocs4/ocs.html#_scale_ocp_cluster_and_add_new_worker_nodes
#
# This policy contains an Amazon Machine Identifier which must be updated in the policy.  Obtain the AMI id from:
# https://access.redhat.com/documentation/en-us/openshift_container_platform/4.9/html/installing/installing-on-aws#installation-aws-ami-stream-metadata_installing-aws-user-infra
#
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: aws-nvidia-machinesets
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: machineset-nvidia-autoscalers
        spec:
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: autoscaling.openshift.io/v1beta1
                kind: MachineAutoscaler
                metadata:
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                  namespace: openshift-machine-api
                spec:
                  minReplicas: 1
                  maxReplicas: 3
                  scaleTargetRef:
                    apiVersion: machine.openshift.io/v1beta1
                    kind: MachineSet
                    name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: autoscaling.openshift.io/v1beta1
                kind: MachineAutoscaler
                metadata:
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                  namespace: openshift-machine-api
                spec:
                  minReplicas: 1
                  maxReplicas: 3
                  scaleTargetRef:
                    apiVersion: machine.openshift.io/v1beta1
                    kind: MachineSet
                    name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: autoscaling.openshift.io/v1beta1
                kind: MachineAutoscaler
                metadata:
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}c'
                  namespace: openshift-machine-api
                spec:
                  minReplicas: 1
                  maxReplicas: 3
                  scaleTargetRef:
                    apiVersion: machine.openshift.io/v1beta1
                    kind: MachineSet
                    name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}c'

    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: machineset-nvidia-worker1
        spec:
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: machine.openshift.io/v1beta1
                kind: MachineSet
                metadata:
                  labels:
                    machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                    machine.openshift.io/cluster-api-machine-role: gpu
                    machine.openshift.io/cluster-api-machine-type: gpu
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                  namespace: openshift-machine-api
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                      machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                  template:
                    metadata:
                      labels:
                        machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                        machine.openshift.io/cluster-api-machine-role: gpu
                        machine.openshift.io/cluster-api-machine-type: gpu
                        machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                    spec:
                      metadata:
                        labels:
                          node-role.kubernetes.io/gpu: ""
                      taints:
                        # - key: node-role.kubernetes.io/infra
                        #   effect: NoSchedule
                        #   value: "true"
                        - key: nvidia.com/gpu
                          effect: NoSchedule
                          value: "true"
                      providerSpec:
                        value:
                          ami:
                            id: '{{- $msName := printf "%s-worker-%sa" (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region -}}
                                {{- (lookup "machine.openshift.io/v1beta1" "MachineSet" "openshift-machine-api" $msName).spec.template.spec.providerSpec.value.ami.id -}}'
                          apiVersion: awsproviderconfig.openshift.io/v1beta1
                          blockDevices:
                            - ebs:
                                encrypted: true
                                iops: 2000
                                kmsKey:
                                  arn: ''
                                volumeSize: 500
                                volumeType: io1
                          credentialsSecret:
                            name: aws-cloud-credentials
                          deviceIndex: 0
                          iamInstanceProfile:
                            id: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-worker-profile'
                          instanceType: g6e.2xlarge
                          kind: AWSMachineProviderConfig
                          metadata:
                            creationTimestamp: null
                          placement:
                            availabilityZone: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                            region: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}'
                          publicIp: null
                          securityGroups:
                            - filters:
                                - name: tag:Name
                                  values:
                                    - '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-node'
                          subnet:
                            filters:
                              - name: tag:Name
                                values:
                                  - '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-subnet-private-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}a'
                          tags:
                            - name: 'kubernetes.io/cluster/{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                              value: owned
                          userDataSecret:
                            name: worker-user-data
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: machine.openshift.io/v1beta1
                kind: MachineSet
                metadata:
                  labels:
                    machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                    machine.openshift.io/cluster-api-machine-role: gpu
                    machine.openshift.io/cluster-api-machine-type: gpu
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                  namespace: openshift-machine-api
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                      machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                  template:
                    metadata:
                      labels:
                        machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                        machine.openshift.io/cluster-api-machine-role: gpu
                        machine.openshift.io/cluster-api-machine-type: gpu
                        machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                    spec:
                      metadata:
                        labels:
                          node-role.kubernetes.io/gpu: ""
                      taints:
                        - key: nvidia.com/gpu
                          effect: NoSchedule
                          value: "true"
                      providerSpec:
                        value:
                          ami:
                            #id: '{{ (lookup "machine.openshift.io/v1beta1" "MachineSet" "openshift-machine-api" ((lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName "-worker-" (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region "b" | join "")).spec.template.spec.providerSpec.value.ami.id }}'
                            id: '{{- $msName := printf "%s-worker-%sb" (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region -}}
                                {{- (lookup "machine.openshift.io/v1beta1" "MachineSet" "openshift-machine-api" $msName).spec.template.spec.providerSpec.value.ami.id -}}'
                          apiVersion: awsproviderconfig.openshift.io/v1beta1
                          blockDevices:
                            - ebs:
                                encrypted: true
                                iops: 2000
                                kmsKey:
                                  arn: ''
                                volumeSize: 500
                                volumeType: io1
                          credentialsSecret:
                            name: aws-cloud-credentials
                          deviceIndex: 0
                          iamInstanceProfile:
                            id: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-worker-profile'
                          instanceType: g6e.2xlarge
                          kind: AWSMachineProviderConfig
                          metadata:
                            creationTimestamp: null
                          placement:
                            availabilityZone: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                            region: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}'
                          publicIp: null
                          securityGroups:
                            - filters:
                                - name: tag:Name
                                  values:
                                    - '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-node'
                          subnet:
                            filters:
                              - name: tag:Name
                                values:
                                  - '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-subnet-private-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}b'
                          tags:
                            - name: 'kubernetes.io/cluster/{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                              value: owned
                          userDataSecret:
                            name: worker-user-data

            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: machine.openshift.io/v1beta1
                kind: MachineSet
                metadata:
                  labels:
                    machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                    machine.openshift.io/cluster-api-machine-role: gpu
                    machine.openshift.io/cluster-api-machine-type: gpu
                  name: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}c'
                  namespace: openshift-machine-api
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                      machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}c'
                  template:
                    metadata:
                      labels:
                        machine.openshift.io/cluster-api-cluster: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}'
                        machine.openshift.io/cluster-api-machine-role: gpu
                        machine.openshift.io/cluster-api-machine-type: gpu
                        machine.openshift.io/cluster-api-machineset: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-gpu-{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region }}c'
                    spec:
                      metadata:
                        labels:
                          node-role.kubernetes.io/gpu: ""
                      taints:
                        - key: nvidia.com/gpu
                          effect: NoSchedule
                          value: "true"
                      providerSpec:
                        value:
                          ami:
                            #id: '{{ (lookup "machine.openshift.io/v1beta1" "MachineSet" "openshift-machine-api" ((lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName "-worker-" (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region "c" | join "")).spec.template.spec.providerSpec.value.ami.id }}'
                            id: '{{- $msName := printf "%s-worker-%sc" (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.platformStatus.aws.region -}}
                                {{- (lookup "machine.openshift.io/v1beta1" "MachineSet" "openshift-machine-api" $msName).spec.template.spec.providerSpec.value.ami.id -}}'
                          apiVersion: awsproviderconfig.openshift.io/v1beta1
                          blockDevices:
                            - ebs:
                                encrypted: true
                                iops: 2000
                                kmsKey:
                                  arn: ''
                                volumeSize: 500
                                volumeType: io1
                          credentialsSecret:
                            name: aws-cloud-credentials
                          deviceIndex: 0
                          iamInstanceProfile:
                            id: '{{ (lookup "config.openshift.io/v1" "Infrastructure" "" "cluster").status.infrastructureName }}-worker-profile'
                          instanceType: g6e.2xlarge
                          kind: AWSMachineProviderConfig
                          metadata:
                            creationTimestamp: null
                          placement:
