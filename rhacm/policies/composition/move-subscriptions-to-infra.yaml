---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: subs-on-infra
  annotations:
    policy.open-cluster-management.io/description: Moves subscriptions to infrastructure nodes
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: subs-on-infra
        spec:
          remediationAction: enforce
          severity: low
          object-templates-raw: |
            {{/* ##  Loop through all the Nodes ## */}}
            {{- $nodeList := (lookup "v1" "Node" "" "").items }}
            {{- $infraNodesDetected := false }}
            {{- range $node := $nodeList }}
              {{- if (hasKey $node.metadata.labels "node-role.kubernetes.io/infra") }}
                {{- $infraNodesDetected = true }}
              {{- end -}}
            {{- end }}
            {{- if $infraNodesDetected }}
            {{/* ##  Loop through all the Subscriptions ## */}}
            {{- $subscriptionList := (lookup "operators.coreos.com/v1alpha1" "Subscription" "" "").items }}
            {{- range $subscription := $subscriptionList }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: {{ $subscription.metadata.name }}
                  namespace: {{ $subscription.metadata.namespace }}
                spec:
                  config:
                    nodeSelector:
                      node-role.kubernetes.io/infra: ""
                    tolerations:
                      - key: node-role.kubernetes.io/infra
                        operator: Exists
                        effect: NoSchedule
            {{- end }}
            {{- end }}