---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: instance-rhoai3
  annotations:
    policy.open-cluster-management.io/description: Deploys the Red Hat OpenShift AI Operator Instance
    policy.open-cluster-management.io/categories: OCPOM - OpenShift Operator Management
    policy.open-cluster-management.io/standards: Kemo Labs 2025
    policy.open-cluster-management.io/controls: OLM-INST - Operator Instance
spec:
  disabled: false
  policy-templates:
    # Create a MCSB to allow for the targeted placement that copies the DB secret
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-rhoai
          namespace: ""
          compliance: Compliant
      ignorePending: true
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: mcsb-global-rhoads
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1beta2
                kind: ManagedClusterSetBinding
                metadata:
                  name: global
                  namespace: redhat-ods-applications
                spec:
                  clusterSet: global
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1beta2
                kind: ManagedClusterSetBinding
                metadata:
                  name: global
                  namespace: redhat-ods-monitoring
                spec:
                  clusterSet: global

    # Create the Kuadrant namespace and operator instance
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-rhoai
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-kuadrant
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: kuadrant-system
            - complianceType: musthave
              objectDefinition:
                apiVersion: kuadrant.io/v1beta1
                kind: Kuadrant
                metadata:
                  name: kuadrant
                  namespace: kuadrant-system
                spec:
                  observability:
                    enable: true

    # Check for the Authorino service so we can annotate it
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-kuadrant
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-auth-svc-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Service
                metadata:
                  name: authorino-authorino-authorization
                  namespace: kuadrant-system

    # Enforce the Authorino service annotations for TLS cert generation
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-auth-svc-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-auth-svc-meta
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Service
                metadata:
                  name: authorino-authorino-authorization
                  namespace: kuadrant-system
                  metadata:
                    annotations:
                      service.beta.openshift.io/serving-cert-secret-name: authorino-server-cert

    # Create the Authorino instance
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-auth-svc-meta
          namespace: ""
          compliance: Compliant
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-authorino
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-authorino
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.authorino.kuadrant.io/v1beta1
                kind: Authorino
                metadata:
                  name: authorino
                  namespace: kuadrant-system
                spec:
                  replicas: 1
                  clusterWide: true
                  listener:
                    tls:
                      enabled: true
                      certSecretRef:
                        name: authorino-server-cert
                  oidcServer:
                    tls:
                      enabled: false

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-rhoai
          namespace: ""
          compliance: Compliant
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: default-gatewayclass
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-gateway
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: maas-default-gateway-config
                  namespace: openshift-ingress
                data:
                  service: |
                    spec:
                      type: ClusterIP
            - complianceType: musthave
              objectDefinition:
                apiVersion: route.openshift.io/v1
                kind: Route
                metadata:
                  name: maas-default-gateway
                  namespace: openshift-ingress
                spec:
                  host: '{{ (fromClusterClaim "consoleurl.cluster.open-cluster-management.io") | replace "https://console-openshift-console" "maas" }}'
                  port:
                    targetPort: 80
                  tls:
                    insecureEdgeTerminationPolicy: Allow
                    termination: edge
                  to:
                    kind: Service
                    name: maas-default-gateway-openshift-default
                    weight: 100
                  wildcardPolicy: None
            - complianceType: musthave
              objectDefinition:
                apiVersion: gateway.networking.k8s.io/v1
                kind: Gateway
                metadata:
                  name: maas-default-gateway
                  namespace: openshift-ingress
                  labels:
                    opendatahub.io/managed: "false"
                  annotations:
                    opendatahub.io/managed: "false"
                    security.opendatahub.io/authorino-tls-bootstrap: "true"
                spec:
                  gatewayClassName: openshift-default
                  infrastructure:
                    parametersRef:
                      group: ""
                      kind: ConfigMap
                      name: maas-default-gateway-config
                  listeners:
                    - name: http
                      port: 80
                      protocol: HTTP
                      hostname: '{{ (fromClusterClaim "consoleurl.cluster.open-cluster-management.io") | replace "https://console-openshift-console" "maas" }}'
                      allowedRoutes:
                        namespaces:
                          from: All

    # Check for the Tenant instance so we can configure it
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-gateway
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-tenant-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: maas.opendatahub.io/v1alpha1
                kind: Tenant
                metadata:
                  name: default-tenant
                  namespace: models-as-a-service

    # Configure the Tenant instance for Telemetry
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-tenant-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-tenant-telemetry
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: maas.opendatahub.io/v1alpha1
                kind: Tenant
                metadata:
                  name: default-tenant
                  namespace: models-as-a-service
                spec:
                  telemetry:
                    enabled: true
                    metrics:
                      captureModelUsage: true
                      captureOrganization: true
                      captureUser: false
                      captureGroup: false

    # Check for the DSCI instance so we can configure it
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-rhoai
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-dsci-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: dscinitialization.opendatahub.io/v2
                kind: DSCInitialization
                metadata:
                  name: default-dsci

    # Configure the DSCI instance for observability
    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-dsci-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-dsci-o11y
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: dscinitialization.opendatahub.io/v2
                kind: DSCInitialization
                metadata:
                  name: default-dsci
                spec:
                  monitoring:
                    managementState: Managed                 # Required: Enables and manages the observability stack
                    namespace: redhat-ods-monitoring    # Required: Namespace where monitoring components are deployed
                    collectorReplicas: 1                        # Optional: Number of collector instances for high availability
                    # alerting: {}                              # Alertmanager configuration, uses default settings if empty
                    metrics:                                  # Prometheus configuration for metrics collection
                      replicas: 1                             # Optional: Number of Prometheus instances
                      # resources:                              # CPU and memory requests and limits for Prometheus pods
                      #   cpulimit: 500m                        # Optional: Maximum CPU allocation in millicores
                      #   cpurequest: 100m                      # Optional: Minimum CPU allocation in millicores
                      #   memorylimit: 512Mi                    # Optional: Maximum memory allocation in mebibytes
                      #   memoryrequest: 256Mi                  # Optional: Minimum memory allocation in mebibytes
                      storage:                                # Storage configuration for metrics data
                        size: 5Gi                             # Required: Storage size for Prometheus data
                        retention: 10d                        # Required: Retention period for metrics data in days
                      exporters: {}                           # External metrics exporters
                    traces:                                   # Tempo backend for distributed tracing
                      sampleRatio: '0.1'                      # Optional: Portion of traces to sample, expressed as a decimal
                      storage:                                # Storage configuration for trace data
                        backend: pv                           # Required: Storage backend for Tempo traces (pv, s3, or gcs)
                        retention: 2160h                      # Optional: Retention period for trace data in hours
                      exporters: {}                           # External traces exporters
                      tls:
                        enabled: false

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-cnpgsql
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: maas-pgsql-instance
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                kind: Cluster
                apiVersion: postgresql.cnpg.io/v1
                metadata:
                  name: maas-db
                  namespace: redhat-ods-applications
                spec:
                  instances: 1
                  enableSuperuserAccess: true
                  logLevel: info
                  primaryUpdateStrategy: unsupervised
                  storage:
                    size: 1Gi
                  walStorage:
                    size: 1Gi

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: Policy
          name: operators-rhoai
          namespace: ""
          compliance: Compliant
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: maas-pgsql-instance
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-instance
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                kind: DataScienceCluster
                apiVersion: datasciencecluster.opendatahub.io/v2
                metadata:
                  name: default-dsc
                  labels:
                    app.kubernetes.io/name: datasciencecluster
                spec:
                  components:
                    dashboard:
                      managementState: Managed
                    aipipelines:
                      managementState: Managed
                    feastoperator:
                      managementState: Managed
                    kserve:
                      managementState: Managed
                      rawDeploymentServiceConfig: Headed
                      modelsAsService:
                        managementState: Managed
                    llamastackoperator:
                      managementState: Managed
                    kueue:
                      managementState: Unmanaged
                      defaultClusterQueueName: default
                      defaultLocalQueueName: default
                    mlflowoperator:
                      managementState: Managed
                    sparkoperator:
                      managementState: Managed
                    modelregistry:
                      managementState: Managed
                      registriesNamespace: rhoai-model-registries
                    ray:
                      managementState: Managed
                    workbenches:
                      managementState: Managed
                      workbenchNamespace: rhods-notebooks
                    trainer:
                      managementState: Managed
                    trainingoperator:
                      managementState: Managed
                    trustyai:
                      managementState: Managed

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-operator-status
          namespace: ""
          compliance: Compliant
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-instance
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-odhdash-check
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: opendatahub.io/v1alpha
                kind: OdhDashboardConfig
                metadata:
                  name: odh-dashboard-config
                  namespace: redhat-ods-applications

    - extraDependencies:
        - apiVersion: policy.open-cluster-management.io/v1
          kind: ConfigurationPolicy
          name: rhoai-odhdash-check
          namespace: ""
          compliance: Compliant
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: rhoai-odhdash-maas
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: opendatahub.io/v1alpha
                kind: OdhDashboardConfig
                metadata:
                  name: odh-dashboard-config
                  namespace: redhat-ods-applications
                spec:
                  dashboardConfig:
                    genAiStudio: true
                    vLLMDeploymentOnMaaS: true
                    maasAuthPolicies: true
                    observabilityDashboard: true
                    modelAsService: true
                    disableTracking: true
