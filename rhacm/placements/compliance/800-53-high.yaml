---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: 800-53-high
spec:
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: compliance.kemo.dev/800-53-high
              operator: In
              values:
                - 'true'
                - 'enabled'