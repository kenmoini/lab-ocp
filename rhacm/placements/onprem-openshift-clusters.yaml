---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: onprem-openshift-clusters
spec:
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - "OpenShift"
            - key: location
              operator: In
              values:
                - "kemo-labs-rdu"
            - key: cloud
              operator: NotIn
              values:
                - "KubeVirt"