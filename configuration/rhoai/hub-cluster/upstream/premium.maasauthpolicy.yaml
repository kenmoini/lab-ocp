apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSAuthPolicy
metadata:
  name: "premium-models-access"
  namespace: "models-as-a-service"
  labels:
    migration.maas.opendatahub.io/from-tier: "premium"
  annotations:
    migration.maas.opendatahub.io/original-tier: "premium"
    description: "Access policy for premium tier models"
spec:
  modelRefs:
    - name: "simulated-premium"
      namespace: "ai-models"
      tokenRateLimits:
        simulated-premium:
          - limit: 100000
            window: 1m
  subjects:
    groups:
      - name: "system:authenticated"
      - name: "premium-users"
    users:
      - kemo