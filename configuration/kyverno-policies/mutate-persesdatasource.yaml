apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: add-ns-to-persesdatasource
  annotations:
    policies.kyverno.io/title: Add Namespace to Perses Datasource
    policies.kyverno.io/category: Perses
    policies.kyverno.io/severity: medium
    kyverno.io/kyverno-version: 1.8.0
    policies.kyverno.io/minversion: 1.6.0
    kyverno.io/kubernetes-version: "1.24"
    policies.kyverno.io/subject: Namespace
    policies.kyverno.io/description: Adds the namespace to the Perses datasource.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups:
          - "perses.dev"
        apiVersions:
          - v1alpha2
        operations:
          - CREATE
          - UPDATE
        resources:
          - PersesDatasource
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: |
          !has(object.spec.client.tls.caCert.namespace) ?
          [
            JSONPatch{
              op: "add",
              path: "/spec/client/tls/caCert/namespace",
              value: "{{request.namespace}}"
            }
          ] : []